<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" width="256" height="256">
  <!--
    massocios favicon — small variant (16/32/48/96).
    Same composition as large (tile → bubble → plus) but no shadow,
    bubble enlarged to fill the tile, thicker plus strokes for legibility at 16px.
  -->
  <g transform="translate(128 128) rotate(-4) translate(-110 -110)">
    <!-- magenta tile (slightly larger since no shadow takes up space) -->
    <rect x="0" y="0" width="220" height="220" rx="48" ry="48" fill="#E8336B" />

    <!-- cream chat bubble — enlarged to ~78% of the tile so it reads at 16px -->
    <path
      d="
        M52 36
        h116
        a24 24 0 0 1 24 24
        v82
        a24 24 0 0 1 -24 24
        h-60
        l-30 30
        v-30
        h-26
        a24 24 0 0 1 -24 -24
        v-82
        a24 24 0 0 1 24 -24
        z"
      fill="#FFFBF2"
    />

    <!-- yellow plus, thicker stroke for small-size legibility -->
    <g stroke="#FFD23F" stroke-width="22" stroke-linecap="round">
      <line x1="110" y1="68" x2="110" y2="134" />
      <line x1="77" y1="101" x2="143" y2="101" />
    </g>
  </g>
</svg>
