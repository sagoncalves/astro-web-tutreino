<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" width="256" height="256">
  <!--
    massocios favicon — large variant (144px+).
    Three layers: magenta tile → cream chat bubble nested inside → yellow plus
    inside the bubble. Rotated -4° with offset ink shadow.
  -->
  <g transform="translate(128 128) rotate(-4) translate(-100 -100)">
    <!-- ink offset shadow -->
    <rect x="0" y="0" width="200" height="200" rx="44" ry="44" fill="#0E3B43" transform="translate(10 10)" />

    <!-- magenta tile -->
    <rect x="0" y="0" width="200" height="200" rx="44" ry="44" fill="#E8336B" />

    <!-- cream chat bubble inside the tile (rounded rectangle + tail at bottom-left) -->
    <path
      d="
        M58 44
        h84
        a22 22 0 0 1 22 22
        v62
        a22 22 0 0 1 -22 22
        h-46
        l-22 22
        v-22
        h-16
        a22 22 0 0 1 -22 -22
        v-62
        a22 22 0 0 1 22 -22
        z"
      fill="#FFFBF2"
    />

    <!-- yellow plus inside the bubble -->
    <g stroke="#FFD23F" stroke-width="16" stroke-linecap="round">
      <line x1="100" y1="74" x2="100" y2="124" />
      <line x1="75" y1="99" x2="125" y2="99" />
    </g>
  </g>
</svg>
